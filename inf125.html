<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Sees Your Future | NKU</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#000;
  color:#fff;
  text-align:center;
}

.container{
  padding:24px;
  max-width:700px;
  margin:auto;
}

h1{
  font-size:2.5rem;
  line-height:1.1;
}

.gold{color:#FFC72C;}

.btn{
  display:block;
  margin-top:14px;
  padding:16px;
  border-radius:12px;
  font-weight:bold;
  text-decoration:none;
}

.primary{background:#FFC72C;color:#000;}
.secondary{background:#222;color:#fff;}

select{
  width:100%;
  padding:14px;
  margin-top:16px;
  border-radius:10px;
  font-size:1rem;
}

#reveal{
  display:none;
  margin-top:30px;
  font-size:1.3rem;
}

#countdown{
  margin-top:20px;
  font-size:1.5rem;
}

.sticky{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#000;
  padding:12px;
}
</style>
</head>

<body>

<div class="container">

<h1>
AI is coming for your future.<br>
<span class="gold">Let’s see how.</span>
</h1>

<p>Select your major 👇</p>

<select id="major">
  <option value="">Choose your major</option>
  <option>Business</option>
  <option>Health</option>
  <option>Education</option>
  <option>Communication</option>
  <option>Arts</option>
  <option>Technology</option>
  <option>Undecided</option>
</select>

<button class="btn primary" onclick="revealFuture()">
See My AI Future
</button>

<div id="reveal"></div>
<div id="countdown"></div>

<a class="btn primary"
href="https://one.nku.edu/task/all/registerforclass"
target="_blank">
Register for INF 125
</a>

</div>

<div class="sticky">
<a class="btn primary"
href="https://one.nku.edu/task/all/registerforclass"
target="_blank">
Register Now
</a>
</div>

<script>
const messages = {
  "Business": "AI will automate decisions, marketing, and strategy.",
  "Health": "AI will assist diagnosis, treatment, and patient care.",
  "Education": "AI will reshape how students learn and teachers teach.",
  "Communication": "AI will generate content, media, and messaging.",
  "Arts": "AI is already creating music, visuals, and design.",
  "Technology": "AI will redefine software, systems, and innovation.",
  "Undecided": "AI will shape EVERY career path."
};

function revealFuture(){
  const major = document.getElementById("major").value;

  if(!major){
    alert("Pick a major first 👀");
    return;
  }

  const text = messages[major];

  document.getElementById("reveal").style.display="block";
  document.getElementById("reveal").innerHTML =
    `<span class="gold">For ${major} majors:</span><br>${text}<br><br>
     This is exactly why INF 125 exists.`;

  startCountdown();
}

function startCountdown(){
  const target = new Date("2026-08-24T10:50:00");

  setInterval(()=>{
    const now = new Date();
    const diff = target - now;

    const days = Math.floor(diff/(1000*60*60*24));
    const hrs = Math.floor((diff/(1000*60*60))%24);

    document.getElementById("countdown").innerHTML =
      `Course starts in ${days} days ${hrs} hrs`;
  },1000);
}
</script>

</body>
</html>
