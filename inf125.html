<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>INF 125: AI Literacy</title>

<style>
:root{
  --gold:#FFC72C;
  --dark:#0b0b0b;
  --text:#ffffff;
  --muted:rgba(255,255,255,0.7);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, rgba(255,199,44,.15), transparent 40%), #000;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  text-align:center;
  padding:20px;
}

/* Container */
.container{
  max-width:520px;
  width:100%;
}

/* Headline */
h1{
  font-size:clamp(2rem,6vw,3rem);
  line-height:1.1;
  margin-bottom:16px;
}

.gold{ color:var(--gold); }

/* Subtext */
.sub{
  color:var(--muted);
  font-size:1rem;
  line-height:1.5;
  margin-bottom:24px;
}

/* Card */
.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

/* Dynamic text */
.dynamic{
  font-size:1.2rem;
  font-weight:700;
  margin-top:10px;
}

/* Button */
button{
  width:100%;
  padding:16px;
  border-radius:16px;
  border:none;
  font-weight:800;
  font-size:1rem;
  cursor:pointer;
  margin-top:10px;
}

.primary{
  background:linear-gradient(135deg,#ffe08e,var(--gold));
  color:#111;
}

.secondary{
  background:rgba(255,255,255,0.08);
  color:white;
  border:1px solid rgba(255,255,255,0.15);
}

/* Fade animation */
.fade{
  opacity:0;
  transform:translateY(10px);
  transition:.5s ease;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADLINE -->
  <h1>
    AI is changing <span class="gold">every major.</span>
  </h1>

  <p class="sub">
    The question is… how will it impact <strong>you</strong>?
  </p>

  <!-- EXPERIENCE CARD -->
  <div class="card fade show" id="step1">
    <div>Tap to see how AI connects to your world</div>
    <button class="primary" onclick="nextStep()">Show Me</button>
  </div>

  <!-- STEP 2 -->
  <div class="card fade" id="step2">
    <div>This isn’t just for computer science.</div>
    <div class="dynamic" id="majorText"></div>
  </div>

  <!-- STEP 3 -->
  <div class="card fade" id="step3">
    <div>
      INF 125: AI Literacy is designed for <span class="gold">all majors</span>.
    </div>
    <p class="sub">
      No coding required. Just curiosity.
    </p>
  </div>

  <!-- CTA -->
  <div class="card fade" id="step4">
    <div style="font-weight:800; margin-bottom:10px;">
      Fall 2026 • Griffin Hall • NKU
    </div>

    <button class="primary" onclick="register()">
      View / Register for INF 125
    </button>

    <button class="secondary" onclick="restart()">
      Restart Experience
    </button>
  </div>

</div>

<script>
const majors = [
  "Business → AI is changing decision-making.",
  "Health → AI is transforming patient care.",
  "Education → AI is reshaping classrooms.",
  "Marketing → AI is rewriting content creation.",
  "Design → AI is redefining creativity.",
  "Everyone → AI will impact your future."
];

let index = 0;

function nextStep(){
  document.getElementById("step1").classList.remove("show");

  setTimeout(()=>{
    showStep("step2");
    rotateMajors();
  },300);

  setTimeout(()=> showStep("step3"), 2000);
  setTimeout(()=> showStep("step4"), 3500);
}

function showStep(id){
  document.getElementById(id).classList.add("show");
}

function rotateMajors(){
  const el = document.getElementById("majorText");

  setInterval(()=>{
    el.textContent = majors[index];
    index = (index + 1) % majors.length;
  },1200);
}

function register(){
  // Replace with actual NKU registration link
  window.open("https://nku.edu", "_blank");
}

function restart(){
  location.reload();
}
</script>

</body>
</html>
