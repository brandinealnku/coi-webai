<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowdCode Host V7</title>

<style>
:root {
  --bg: #f5f7fb;
  --panel: #ffffff;
  --text: #111827;
  --muted: #6b7280;
  --accent: #6366f1;
  --accent-soft: #e0e7ff;
  --border: #e5e7eb;
  --radius: 16px;
}

body.dark {
  --bg: #0f172a;
  --panel: #111827;
  --text: #f9fafb;
  --muted: #9ca3af;
  --border: #1f2937;
  --accent-soft: #1e293b;
}

body {
  margin:0;
  font-family: Inter, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.container {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 20px;
  padding: 20px;
}

.panel {
  background: var(--panel);
  border-radius: var(--radius);
  padding: 18px;
  border: 1px solid var(--border);
}

/* ---------- SEGMENTED CONTROL ---------- */
.segmented {
  display:flex;
  background: var(--accent-soft);
  border-radius: 12px;
  padding: 4px;
}

.segmented button {
  flex:1;
  border:none;
  background: transparent;
  padding:10px;
  border-radius: 10px;
  cursor:pointer;
}

.segmented button.active {
  background: white;
  font-weight:600;
}

/* ---------- SWITCH ---------- */
.switch {
  position: relative;
  width: 44px;
  height: 24px;
}

.switch input {
  display:none;
}

.slider {
  position:absolute;
  cursor:pointer;
  inset:0;
  background:#ccc;
  border-radius: 999px;
}

.slider:before {
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  left:3px;
  top:3px;
  background:white;
  border-radius:50%;
  transition:.2s;
}

input:checked + .slider {
  background: var(--accent);
}

input:checked + .slider:before {
  transform: translateX(20px);
}

/* ---------- BUTTON GROUP ---------- */
.btn-group {
  display:flex;
  gap:8px;
}

.btn-group button {
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background: var(--panel);
  cursor:pointer;
}

.btn-group button.active {
  background: var(--accent);
  color:white;
}

/* ---------- RANGE SLIDER ---------- */
.range {
  width:100%;
}

/* ---------- STEPPER ---------- */
.stepper {
  display:flex;
  align-items:center;
  gap:8px;
}

.stepper button {
  width:32px;
  height:32px;
  border-radius:8px;
  border:1px solid var(--border);
  background: var(--panel);
  cursor:pointer;
}

/* ---------- INPUT ---------- */
input[type="text"] {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
}

/* ---------- HEADER ---------- */
.header {
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

h3 {
  margin:0 0 10px;
}

</style>
</head>

<body>

<div class="container">

  <!-- MAIN STAGE -->
  <div class="panel">
    <h2>CrowdCode Live</h2>
    <p>Stage preview stays here</p>

    <div style="height:400px;border-radius:20px;background:#111;"></div>
  </div>

  <!-- INSPECTOR -->
  <div class="panel">

    <div class="header">
      <h3>Controls</h3>

      <!-- DARK MODE -->
      <label class="switch">
        <input type="checkbox" id="themeToggle">
        <span class="slider"></span>
      </label>
    </div>

    <!-- SESSION -->
    <h3>Session</h3>
    <input type="text" placeholder="Session name">

    <!-- MODE -->
    <h3>Mode</h3>
    <div class="segmented">
      <button class="active">Mosaic</button>
      <button>Repeat</button>
      <button>Sections</button>
    </div>

    <!-- COUNTDOWN -->
    <h3>Countdown</h3>
    <div class="stepper">
      <button>-</button>
      <span>8s</span>
      <button>+</button>
    </div>

    <!-- AUTO START -->
    <h3>Auto Start</h3>
    <label class="switch">
      <input type="checkbox" checked>
      <span class="slider"></span>
    </label>

    <!-- ENERGY -->
    <h3>Room Energy Sensitivity</h3>
    <input type="range" class="range" min="0" max="100">

    <!-- ANIMATION STYLE -->
    <h3>Animation Style</h3>
    <div class="btn-group">
      <button class="active">Pulse</button>
      <button>Flash</button>
      <button>Audio</button>
    </div>

    <!-- FLASH SETTINGS -->
    <h3>Flash Strength</h3>
    <input type="range" class="range">

    <!-- AUDIO -->
    <h3>Audio Mode</h3>
    <div class="btn-group">
      <button class="active">Visual</button>
      <button>Sync</button>
    </div>

    <!-- ACTIONS -->
    <h3>Actions</h3>
    <div class="btn-group">
      <button>Lobby</button>
      <button>Countdown</button>
      <button>Reveal</button>
    </div>

  </div>

</div>

<script>
document.getElementById("themeToggle").addEventListener("change", e => {
  document.body.classList.toggle("dark", e.target.checked);
});
</script>

</body>
</html>
